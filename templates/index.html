<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calorie Predictor</title>

    <link rel="stylesheet" href="../static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="page">

    <div class="card">

        <div class="header">
            <h1>Daily Calorie Predictor</h1>
            <p>Estimate your daily caloric needs based on lifestyle & body metrics</p>
        </div>

        <form method="POST" class="form">

            <div class="grid">

                <div class="field">
                    <label>Age</label>
                    <input type="number" name="age" required>
                </div>

                <div class="field">
                    <label>Gender</label>
                    <select name="gender">
                        <option value="1">Male</option>
                        <option value="0">Female</option>
                    </select>
                </div>

                <div class="field">
                    <label>Height (cm)</label>
                    <input type="number" id="height" name="height" required>
                </div>

                <div class="field">
                    <label>Weight (kg)</label>
                    <input type="number" id="weight" name="weight" required>
                </div>

                <div class="field">
                    <label>BMI</label>
                    <input type="text" id="bmi" readonly>
                </div>

                <div class="field full">
                    <label>Activity Level</label>
                    <select name="activity">
                        <option value="sedentary">Little or No Exercise</option>
                        <option value="lightly_active">Light Exercise (1–3 days/week)</option>
                        <option value="moderately_active">Moderate Exercise (3–5 days/week)</option>
                        <option value="very_active">Heavy Exercise (6–7 days/week)</option>
                        <option value="athlete">Athlete</option>
                    </select>
                </div>

                <div class="field full">
                    <label>Diet Type</label>
                    <select name="diet">
                        <option value="balanced">Balanced</option>
                        <option value="high_protein">High Protein</option>
                        <option value="vegetarian">Vegetarian</option>
                        <option value="vegan">Vegan</option>
                        <option value="keto">Low Carb / High Fat</option>
                        <option value="mediterranean">Mediterranean</option>
                    </select>
                </div>

            </div>

            <button type="submit">Predict Calories</button>

        </form>

        {% if prediction %}
        <div class="result">
            <div class="result-value">{{ prediction|round(0) }}</div>
            <div class="result-unit">kcal / day</div>
        </div>
        {% endif %}

    </div>

</div>

<script src="../static/script.js"></script>

</body>
</html>
